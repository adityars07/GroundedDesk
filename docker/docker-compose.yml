services:
  postgres:
    image: postgres:16-alpine
    container_name: groundeddesk-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: groundeddesk
      POSTGRES_USER: gd_user
      POSTGRES_PASSWORD: gd_local_password
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U gd_user -d groundeddesk']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: groundeddesk-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redisdata:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:v1.13.2
    container_name: groundeddesk-qdrant
    restart: unless-stopped
    ports:
      - '6333:6333' # REST API
      - '6334:6334' # gRPC
    volumes:
      - qdrantdata:/qdrant/storage
    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334

volumes:
  pgdata:
  redisdata:
  qdrantdata:
