# ============================================================
# GroundedDesk — RAG Eval PR Report
#
# On every Pull Request, runs the eval suite and posts the
# results as a PR comment so reviewers can see quality scores.
# ============================================================

name: RAG Eval Report

on:
  pull_request:
    branches: [main]

jobs:
  eval-comment:
    name: Post Eval Scores to PR
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: gd_user
          POSTGRES_PASSWORD: gd_local_password
          POSTGRES_DB: groundeddesk
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      qdrant:
        image: qdrant/qdrant:v1.13.0
        ports:
          - 6333:6333

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: '10'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run RAG evals
        id: evals
        run: |
          pnpm --filter eval run evaluate 2>&1 | tee eval-output.txt
          echo "EVAL_OUTPUT<<EOF" >> $GITHUB_OUTPUT
          cat eval-output.txt >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          DATABASE_URL: postgresql://gd_user:gd_local_password@localhost:5432/groundeddesk?schema=public
          QDRANT_HOST: localhost
          QDRANT_PORT: 6333
        continue-on-error: true

      - name: Comment eval results on PR
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const body = [
              '## 📊 RAG Eval Scores',
              '',
              '```',
              `${{ steps.evals.outputs.EVAL_OUTPUT }}`.substring(0, 4000),
              '```',
              '',
              `> Generated by \`pnpm --filter eval run evaluate\` on \`${{ github.sha }}\``,
            ].join('\n');

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });
